<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A1A5E"/>
      <stop offset="100%" stop-color="#221934"/>
    </linearGradient>
    <linearGradient id="gold5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="40%" stop-color="#FFB347"/>
      <stop offset="70%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF9E44"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="250" fill="url(#bg5)" rx="12"/>
  <!-- Radiating lines from center -->
  <line x1="200" y1="100" x2="0" y2="0" stroke="#FF7A00" stroke-width="0.7" opacity="0.1"/>
  <line x1="200" y1="100" x2="400" y2="0" stroke="#FF7A00" stroke-width="0.7" opacity="0.1"/>
  <line x1="200" y1="100" x2="60" y2="0" stroke="#FF7A00" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="100" x2="340" y2="0" stroke="#FF7A00" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="100" x2="0" y2="50" stroke="#FF7A00" stroke-width="0.5" opacity="0.06"/>
  <line x1="200" y1="100" x2="400" y2="50" stroke="#FF7A00" stroke-width="0.5" opacity="0.06"/>
  <!-- Trophy shape -->
  <g filter="url(#goldGlow)" transform="translate(200,95)">
    <!-- Trophy cup -->
    <path d="M-30,-45 L-34,-10 L-18,8 L18,8 L34,-10 L30,-45 Z" fill="url(#gold5)" opacity="0.95"/>
    <!-- Cup inner shine -->
    <path d="M-22,-40 L-25,-12 L-14,2 L14,2 L25,-12 L22,-40 Z" fill="#FFB347" opacity="0.25"/>
    <!-- Trophy handles -->
    <path d="M-30,-38 Q-50,-35 -48,-15 Q-46,2 -32,0" fill="none" stroke="url(#gold5)" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M30,-38 Q50,-35 48,-15 Q46,2 32,0" fill="none" stroke="url(#gold5)" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Trophy stem -->
    <rect x="-5" y="8" width="10" height="14" fill="url(#gold5)" opacity="0.9" rx="2"/>
    <!-- Trophy base -->
    <rect x="-20" y="22" width="40" height="7" fill="url(#gold5)" opacity="0.85" rx="3"/>
    <!-- Star on cup -->
    <polygon points="0,-32 4,-22 14,-22 6,-15 9,-5 0,-11 -9,-5 -6,-15 -14,-22 -4,-22" fill="#221934" opacity="0.35"/>
  </g>
  <!-- Crown accent above trophy -->
  <g transform="translate(200,35)" opacity="0.6">
    <polygon points="0,0 -8,12 -3,8 0,14 3,8 8,12" fill="url(#gold5)"/>
  </g>
  <!-- Sparkle accents -->
  <circle cx="135" cy="65" r="2" fill="#FFB347" opacity="0.5"/>
  <circle cx="265" cy="60" r="1.8" fill="#FFB347" opacity="0.45"/>
  <circle cx="148" cy="135" r="1.5" fill="#FFB347" opacity="0.3"/>
  <circle cx="255" cy="130" r="2" fill="#FFB347" opacity="0.35"/>
  <!-- Text -->
  <text x="200" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="20" fill="#FFB347" letter-spacing="2">CHAMPION OF</text>
  <text x="200" y="216" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="20" fill="#F8F6FB" letter-spacing="2">CHAMPIONS</text>
  <!-- Bottom gold line -->
  <rect x="140" y="232" width="120" height="2.5" rx="1.25" fill="url(#gold5)" opacity="0.6"/>
  <!-- Corner accents -->
  <rect x="16" y="16" width="24" height="2" fill="url(#gold5)" opacity="0.35"/>
  <rect x="16" y="16" width="2" height="24" fill="url(#gold5)" opacity="0.35"/>
  <rect x="360" y="232" width="24" height="2" fill="url(#gold5)" opacity="0.35"/>
  <rect x="382" y="210" width="2" height="24" fill="url(#gold5)" opacity="0.35"/>
</svg>