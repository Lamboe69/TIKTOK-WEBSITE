<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF9E44"/>
    </linearGradient>
    <radialGradient id="shine2" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#F8F6FB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F8F6FB" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="250" fill="url(#bg2)" rx="12"/>
  <rect width="400" height="250" fill="url(#shine2)" rx="12"/>
  <!-- Small decorative diamonds -->
  <polygon points="40,30 45,24 50,30 45,36" fill="#F8F6FB" opacity="0.2"/>
  <polygon points="360,28 365,22 370,28 365,34" fill="#F8F6FB" opacity="0.15"/>
  <polygon points="60,220 64,215 68,220 64,225" fill="#5B2A86" opacity="0.3"/>
  <polygon points="340,218 344,213 348,218 344,223" fill="#5B2A86" opacity="0.25"/>
  <!-- Star shape - 5 points -->
  <g filter="url(#starGlow)" transform="translate(200,100)">
    <polygon points="0,-48 11,-16 46,-16 18,6 28,40 0,20 -28,40 -18,6 -46,-16 -11,-16" fill="#F8F6FB" opacity="0.95"/>
    <polygon points="0,-32 8,-10 32,-10 12,4 20,28 0,14 -20,28 -12,4 -32,-10 -8,-10" fill="#FF7A00" opacity="0.3"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="130" cy="70" r="2.5" fill="#F8F6FB" opacity="0.6"/>
  <circle cx="270" cy="65" r="2" fill="#F8F6FB" opacity="0.5"/>
  <circle cx="155" cy="145" r="1.8" fill="#F8F6FB" opacity="0.4"/>
  <circle cx="248" cy="140" r="2.2" fill="#F8F6FB" opacity="0.5"/>
  <!-- Text -->
  <text x="200" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="26" fill="#221934" letter-spacing="2">MOST BEAUTIFUL</text>
  <text x="200" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="11" fill="#5B2A86" letter-spacing="5" opacity="0.85">CROWN THE BEST</text>
  <!-- Bottom accent bar -->
  <rect x="155" y="230" width="90" height="3" rx="1.5" fill="#5B2A86" opacity="0.4"/>
</svg>