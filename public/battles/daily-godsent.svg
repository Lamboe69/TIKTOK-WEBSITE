  <line x1="148" y1="105" x2="175" y2="105" stroke="#F8F6FB" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
  <line x1="225" y1="105" x2="252" y2="105" stroke="#F8F6FB" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
