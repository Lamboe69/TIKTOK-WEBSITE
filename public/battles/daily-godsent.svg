      <stop offset="0%" stop-color="#5B2A86"/>
      <stop offset="100%" stop-color="#8B4FC6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%">
      <stop offset="0%" stop-color="#F8F6FB" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F8F6FB" stop-opacity="0"/>
