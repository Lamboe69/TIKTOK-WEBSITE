<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B2A86"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    <radialGradient id="shine3" cx="50%" cy="42%">
      <stop offset="0%" stop-color="#F8F6FB" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F8F6FB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg3)" rx="12"/>
  <rect width="400" height="250" fill="url(#shine3)" rx="12"/>
  <!-- Globe circle -->
  <circle cx="200" cy="102" r="48" fill="none" stroke="#F8F6FB" stroke-width="2.8" opacity="0.85"/>
  <!-- Globe meridians -->
  <ellipse cx="200" cy="102" rx="20" ry="48" fill="none" stroke="#F8F6FB" stroke-width="1.8" opacity="0.55"/>
  <ellipse cx="200" cy="102" rx="38" ry="48" fill="none" stroke="#F8F6FB" stroke-width="1.2" opacity="0.35"/>
  <!-- Globe parallels -->
  <ellipse cx="200" cy="82" rx="44" ry="10" fill="none" stroke="#F8F6FB" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="200" cy="102" rx="48" ry="10" fill="none" stroke="#F8F6FB" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="200" cy="122" rx="44" ry="10" fill="none" stroke="#F8F6FB" stroke-width="1.5" opacity="0.4"/>
  <!-- Horizontal center line -->
  <line x1="152" y1="102" x2="248" y2="102" stroke="#F8F6FB" stroke-width="2" opacity="0.6"/>
  <!-- Corner geometric accents -->
  <rect x="20" y="20" width="30" height="2" fill="#F8F6FB" opacity="0.3"/>
  <rect x="20" y="20" width="2" height="30" fill="#F8F6FB" opacity="0.3"/>
  <rect x="350" y="228" width="30" height="2" fill="#F8F6FB" opacity="0.3"/>
  <rect x="378" y="200" width="2" height="30" fill="#F8F6FB" opacity="0.3"/>
  <!-- Location pin accent -->
  <circle cx="220" cy="90" r="4" fill="#FF7A00" opacity="0.9"/>
  <circle cx="220" cy="90" r="7" fill="none" stroke="#FF7A00" stroke-width="1" opacity="0.4"/>
  <!-- Text -->
  <text x="200" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="30" fill="#F8F6FB" letter-spacing="6">COUNTRY</text>
  <text x="200" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#F8F6FB" letter-spacing="4" opacity="0.7">BATTLE OF NATIONS</text>
  <!-- Bottom divider -->
  <line x1="160" y1="232" x2="240" y2="232" stroke="#FF7A00" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>