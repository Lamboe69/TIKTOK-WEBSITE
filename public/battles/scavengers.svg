<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#221934"/>
      <stop offset="100%" stop-color="#2D2142"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF9E44"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg4)" rx="12"/>
  <!-- Diagonal accent stripes -->
  <line x1="320" y1="0" x2="400" y2="80" stroke="#FF7A00" stroke-width="1.5" opacity="0.15"/>
  <line x1="340" y1="0" x2="400" y2="60" stroke="#FF7A00" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="200" x2="80" y2="250" stroke="#FF7A00" stroke-width="1.5" opacity="0.15"/>
  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="400" height="4" fill="url(#accent4)" opacity="0.7"/>
  <!-- Magnifying glass / search icon -->
  <g transform="translate(200,100)">
    <!-- Search circle -->
    <circle cx="-5" cy="-5" r="38" fill="none" stroke="#FF7A00" stroke-width="3.5" opacity="0.9"/>
    <circle cx="-5" cy="-5" r="30" fill="none" stroke="#FF7A00" stroke-width="1" opacity="0.25"/>
    <!-- Handle -->
    <line x1="24" y1="24" x2="48" y2="48" stroke="#FF7A00" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Eye inside search -->
    <ellipse cx="-5" cy="-5" rx="14" ry="10" fill="none" stroke="#F8F6FB" stroke-width="1.8" opacity="0.6"/>
    <circle cx="-5" cy="-5" r="4.5" fill="#F8F6FB" opacity="0.7"/>
    <circle cx="-3.5" cy="-6" r="1.8" fill="#221934" opacity="0.9"/>
  </g>
  <!-- Scan lines effect -->
  <line x1="60" y1="60" x2="60" y2="140" stroke="#FF7A00" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,6"/>
  <line x1="340" y1="55" x2="340" y2="145" stroke="#FF7A00" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,6"/>
  <!-- Text -->
  <text x="200" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="#F8F6FB" letter-spacing="3">SCAVENGERS</text>
  <text x="200" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#FF7A00" letter-spacing="5" opacity="0.85">HUNT. FIND. WIN.</text>
  <!-- Bottom accent dots -->
  <circle cx="180" cy="238" r="2" fill="#FF7A00" opacity="0.4"/>
  <circle cx="200" cy="238" r="2" fill="#FF7A00" opacity="0.6"/>
  <circle cx="220" cy="238" r="2" fill="#FF7A00" opacity="0.4"/>
</svg>